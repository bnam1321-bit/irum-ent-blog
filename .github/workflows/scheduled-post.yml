name: Auto Publish Blog Post

on:
  schedule:
    # 매주 일, 화, 목 21:00 UTC (한국 시간 월, 수, 금 06:00)
    - cron: '0 21 * * 0,2,4'
  workflow_dispatch: # 수동 실행 가능

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Generate Blog Post
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: npm run generate

      - name: Commit and Push changes
        run: |
          git config --global user.name "bnam1321-bit"
          git config --global user.email "bnam1321-bit@users.noreply.github.com"
          git add content/posts/*.md
          git commit -m "🤖 Auto-generated blog post $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git pull --rebase origin main
          git push
